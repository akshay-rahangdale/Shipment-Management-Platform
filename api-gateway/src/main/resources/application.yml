server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  cloud:
    gateway:
      routes:

        - id: shipment-service
          uri: ${SHIPMENT_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/shipments/**
          filters:
            - StripPrefix=2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@clientIpKeyResolver}"
            - name: CircuitBreaker
              args:
                name: shipmentServiceCB
                fallbackUri: forward:/fallback/shipment-service

        - id: tracking-service
          uri: ${TRACKING_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/tracking/**
          filters:
            - StripPrefix=2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 200
                redis-rate-limiter.burstCapacity: 400
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@clientIpKeyResolver}"
            - name: CircuitBreaker
              args:
                name: trackingServiceCB
                fallbackUri: forward:/fallback/tracking-service

        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - StripPrefix=2
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@clientIpKeyResolver}"
            - name: CircuitBreaker
              args:
                name: notificationServiceCB
                fallbackUri: forward:/fallback/notification-service

      default-filters:
        - AddRequestHeader=X-Request-Source, api-gateway

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "https://*.shipment-platform.com"
              - "http://localhost:*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
            allowedHeaders:
              - "*"
            allowCredentials: true

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWT_JWK_URI:http://localhost:8090/oauth2/jwks}
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8090}

resilience4j:
  circuitbreaker:
    instances:
      shipmentServiceCB:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
      trackingServiceCB:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
      notificationServiceCB:
        slidingWindowSize: 5
        failureRateThreshold: 60
        waitDurationInOpenState: 15s
        permittedNumberOfCallsInHalfOpenState: 2

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

logging:
  level:
    com.shipment: INFO
    org.springframework.cloud.gateway: INFO
    reactor.netty: WARN
